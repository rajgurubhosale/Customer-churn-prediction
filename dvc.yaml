stages:
  data_ingestion:
    cmd: python src/components/module_01_data_ingestion.py
    deps:
      - src/components/module_01_data_ingestion.py
      - src/config/config_yaml.yaml
    outs:
      - data/raw/raw_train.csv
      - data/raw/raw_test.csv
      
  feature_engineering:
    cmd: python src/components/module_02_feature_engineering.py
    deps:
      - src/components/module_02_feature_engineering.py
      - data/raw/raw_train.csv
      - data/raw/raw_test.csv
    outs:
      - data/interim/X_train.csv
      - data/interim/X_test.csv
      - data/interim/y_train.csv
      - data/interim/y_test.csv
      - data/dropped_features.pkl
    

  model_training:
    cmd: python src/components/module_04_training_model.py
    deps:
      - src/components/module_04_training_model.py
      - src/components/module_03_data_transformation.py
      - src/config/config_yaml.yaml
      - data/interim/X_train.csv
      - data/interim/y_train.csv
    outs:
      - data/model/model_pipeline.pkl
    params:
      - src/config/config_yaml.yaml:
          - model_training.params

  model_evaluation:
    cmd: python src/components/module_05_model_evalution.py
    deps:
      - src/components/module_05_model_evalution.py
      - src/components/module_04_training_model.py
      - src/config/config_yaml.yaml
      - data/interim/X_test.csv
      - data/interim/y_test.csv